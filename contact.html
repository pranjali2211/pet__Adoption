<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Pet Adoption</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #fdf6f0;
      margin: 0;
      padding: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background-color: #fdf6f0; 
  background-image:url("background.jpg");
  background-size:cover;
  background-position: center; 
  background-repeat: no-repeat;
  margin: 0;
  padding: 0;
}


    .container {
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background-color: #ffffff;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      border-radius: 10px;
    }

    h1 {
      text-align: center;
      color: #ff6b6b;
    }

    p {
      text-align: center;
      color: #323133;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-top: 30px;
    }

    input, textarea {
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 16px;
      width: 100%;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #ff6b6b;
      box-shadow: 0 0 5px rgba(255,107,107,0.5);
    }

    button {
      padding: 15px;
      background-color: #ff6b6b;
      color: white;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #ff4c4c;
    }

    .contact-info {
      margin-top: 40px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      color: #333;
    }

    .contact-info {
      color: #4725f2;
      text-decoration: none;
    }

    @media (max-width: 600px) {
      .container {
        margin: 20px;
        padding: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Contact Us</h1>
    <p>We’d love to hear from you about our furry friends!</p>

    <form action="#" method="POST">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <input type="tel" name="phone" placeholder="Your Phone (optional)">
      <input type="text" name="subject" placeholder="Subject" required>
      <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
      <button type="submit">Send Message</button>
    </form>

    <div class="contact-info">
      <p><b>Email:</b> petlover02@gmail.com</p>
      <p><b>Phone:</b> +91 8605349722</p>
      <p><b>Address:</b>  sangavi, Baramati, India</p>
    </div>
  </div>
</body>
</html>
