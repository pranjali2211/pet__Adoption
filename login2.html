<!DOCTYPE html>
<html lang="en">
<head>
    <!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Login Form</title>
   <style>
    body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: Arial, sans-serif;
    }

    body {
        background-image: url('forestpic.jpeg'); 
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
    }

    .form-container {
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    form {
        background-color: rgba(0, 0, 0, 0.6); 
        padding: 40px;
        border: 3px solid #20C997; 
        border-radius: 10px;
        color: white;
        width: 90%;
        max-width: 400px;
        box-sizing: border-box;
        text-align: center;
    }

    form label {
        font-size: 18px;
        display: block;
        margin-bottom: 8px;
        text-align: left;
    }

    form input {
        padding: 10px;
        margin-bottom: 15px;
        width: 100%;
        font-size: 16px;
        border: 1px solid #ccc;
        border-radius: 5px;
        box-sizing: border-box;
    }

    form button {
        background-color: #20C997;
        color: white;
        padding: 12px 20px;
        font-size: 18px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    form button:hover {
        background-color: #17a589;
    }

    @media (max-width: 768px) {
        form {
            padding: 20px;
        }
    }
   </style> 
   
</head>
<body>
    
   <div class="form-container">
       <form>
            <label for="name">Username:</label>
            <input type="text" id="name" name="name" placeholder="Enter your Username" required title="Only alphabetic characters are allowed.">

            <label for="pass">Password:</label>
            <input type="password" id="pass" name="pass" placeholder="Enter your Password">

            <label for="word">Confirm Password:</label>
            <input type="password" id="word" name="confirm_pass" placeholder="Enter Confirm Password" required>
            <button type="submit"><a href="adopt.html">Login</a></button>
            
       </form>
   </div>
  
</body>
</html>
