<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MLA Navbar</title>
  <style>
    body {
      margin: 0;
      font-family: "Times New Roman", serif;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 40px;
      border-bottom: 2px solid black;
      background-color: white;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
    }

    .nav-links a {
      text-decoration: none;
      color: black;
      margin-left: 20px;
      font-size: 16px;
    }

    .nav-links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="navbar">
    <div class="logo">My MLA Page</div>
    <div class="nav-links">
      <a href="adopt.html">Home</a>
      <a href="contact.html">About</a>
      <a href="#">Work</a>
      <a href="#">Contact</a>
    </div>
  </div>

</body>
</html>
